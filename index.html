<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Reverser</title>
    <style>
        /* Applies the blue background and centers everything */
        body {
            background-color: #3498db; 
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Container for the app to make it look neat */
        .card {
            background: rgba(0, 0, 0, 0.15);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        input {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            margin-right: 10px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #27ae60;
        }

        /* Styles the reversed text output */
        #output {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            min-height: 30px; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Reverse a Word</h2>
        
        <!-- Input field and Button -->
        <input type="text" id="wordInput" placeholder="Type here...">
        <button onclick="reverseWord()">Reverse</button>
        
        <!-- Where the result will show up -->
        <div id="output"></div>
    </div>

    <script>
        function reverseWord() {
            // 1. Grab the text from the input field
            const originalWord = document.getElementById('wordInput').value;
            
            // 2. Split it into an array of letters, reverse the array, and join it back together
            const reversedWord = originalWord.split('').reverse().join('');
            
            // 3. Display the reversed word on the screen
            document.getElementById('output').innerText = reversedWord;
        }
    </script>

</body>
</html>
