version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: amir/docker-task
    # Removed hardcoded IMAGE_TAG from here

phases:
  pre_build:
    commands:
      - 'echo "Logging in to Amazon ECR..."'
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - AWS_REGION=$AWS_DEFAULT_REGION
      - REGISTRY_URL=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - export REPOSITORY_URI=$REGISTRY_URL/$IMAGE_REPO_NAME
      - 'echo "Repository URI: $REPOSITORY_URI"'
      
      # Use the commit hash, but append the unique build number to guarantee a new tag
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}-$CODEBUILD_BUILD_NUMBER
      
      # Log in using the base ECR registry domain
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY_URL

  build:
    commands:
      - echo "Building Docker image..."
      # Only build and tag the unique commit hash
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Pushing Docker image to Amazon ECR..."
      # Only push the unique commit hash tag
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Docker image pushed successfully."
      
      - echo "IMAGE_URI=$REPOSITORY_URI:$IMAGE_TAG" > image_info.env
artifacts:
  files:
    - appspec.yml
    - scripts/**/*
    - image_info.env