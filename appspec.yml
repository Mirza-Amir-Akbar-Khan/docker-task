version: 0.0
os: linux
hooks:
  BeforeInstall:
    - location: scripts/pull_new_image.sh  # Logs into ECR and pulls the image in the background
      timeout: 300
      runas: root
  ApplicationStop:
    - location: scripts/stop_container.sh  # Stops the currently running container
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/start_new_container.sh # Starts the new container using the local image
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/health_check.sh    # Verifies the new container is healthy
      timeout: 120
      runas: root